<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priority Inbox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 6px 12px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
    }

    button.active {
      background: #4a90d9;
      color: #fff;
      border-color: #4a90d9;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px 15px;
      margin-bottom: 10px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .card-rank {
      font-weight: bold;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-placement {
      background: #d4edda;
      color: #155724;
    }

    .badge-result {
      background: #cce5ff;
      color: #004085;
    }

    .badge-event {
      background: #fff3cd;
      color: #856404;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    .card-msg {
      font-size: 13px;
      color: #555;
    }

    .card-footer {
      display: flex;
      gap: 15px;
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .score {
      color: #4a90d9;
      font-weight: bold;
    }

    .info {
      background: #eef;
      border: 1px solid #ccd;
      border-radius: 4px;
      padding: 10px;
      font-size: 12px;
      color: #555;
      margin-top: 20px;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>🔔 Priority Inbox</h1>
  <p class="subtitle" id="subtitle">Loading...</p>

  <div class="controls">
    <label>Show top:</label>
    <select id="topN">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="15">15</option>
      <option value="20">20</option>
    </select>

    <button class="active" data-filter="all">All</button>
    <button data-filter="placement">Placement</button>
    <button data-filter="result">Result</button>
    <button data-filter="event">Event</button>
  </div>

  <div id="list"></div>

  <div class="info">
    <b>Scoring:</b> placement=30, result=20, event=10 + recency bonus (0-10, decays over 7 days)<br>
    <b>Algorithm:</b> Min-Heap of size N → O(M log N) time
  </div>

  <script>
    const TYPE_WEIGHTS = { placement: 30, result: 20, event: 10 };
    const RECENCY_WINDOW = 7 * 24 * 60 * 60 * 1000;

    function calcScore(notif) {
      const w = TYPE_WEIGHTS[notif.type] || 0;
      const age = Date.now() - new Date(notif.timestamp).getTime();
      const r = age >= RECENCY_WINDOW ? 0 : 10 * (1 - age / RECENCY_WINDOW);
      return w + r;
    }

    // min-heap
    class MinHeap {
      constructor(cap) { this.cap = cap; this.h = []; }
      _p(i) { return (i - 1) >> 1; }
      _l(i) { return 2 * i + 1; }
      _r(i) { return 2 * i + 2; }
      _sw(a, b) { [this.h[a], this.h[b]] = [this.h[b], this.h[a]]; }

      _up(i) {
        while (i > 0 && this.h[this._p(i)].score > this.h[i].score) {
          this._sw(this._p(i), i); i = this._p(i);
        }
      }

      _down(i) {
        while (true) {
          let s = i, l = this._l(i), r = this._r(i);
          if (l < this.h.length && this.h[l].score < this.h[s].score) s = l;
          if (r < this.h.length && this.h[r].score < this.h[s].score) s = r;
          if (s === i) break;
          this._sw(i, s); i = s;
        }
      }

      add(item) {
        if (this.h.length < this.cap) { this.h.push(item); this._up(this.h.length - 1); }
        else if (item.score > this.h[0].score) { this.h[0] = item; this._down(0); }
      }

      getAll() {
        const res = [];
        while (this.h.length) {
          this._sw(0, this.h.length - 1);
          res.push(this.h.pop());
          if (this.h.length) this._down(0);
        }
        return res.reverse();
      }
    }

    function getTopN(notifs, n, filter) {
      const heap = new MinHeap(n);
      for (const x of notifs) {
        if (x.read) continue;
        if (filter !== "all" && x.type !== filter) continue;
        heap.add({ ...x, score: calcScore(x) });
      }
      return heap.getAll();
    }

    // sample data
    const now = Date.now(), H = 3600000, D = 86400000;
    const notifications = [
      { id: 1, type: "placement", title: "Google — Offer Letter Released", message: "Congratulations! Your offer letter from Google is ready.", timestamp: new Date(now - 1*H).toISOString(), read: false },
      { id: 2, type: "placement", title: "Microsoft — Interview Scheduled", message: "Your final round interview is on Monday at 10 AM.", timestamp: new Date(now - 12*H).toISOString(), read: false },
      { id: 3, type: "placement", title: "Amazon — Application Accepted", message: "Your application for SDE-1 has been shortlisted.", timestamp: new Date(now - 2*D).toISOString(), read: false },
      { id: 4, type: "placement", title: "Infosys — Offer Expired", message: "Your Infosys offer has expired. Contact TPO.", timestamp: new Date(now - 6*D).toISOString(), read: false },
      { id: 5, type: "result", title: "Semester 6 Results Published", message: "Your SGPA is 8.75. View full results.", timestamp: new Date(now - 2*H).toISOString(), read: false },
      { id: 6, type: "result", title: "IA Marks Updated", message: "IA-2 marks for Data Structures uploaded.", timestamp: new Date(now - 1*D).toISOString(), read: false },
      { id: 7, type: "result", title: "Revaluation Result — DBMS", message: "Your revaluation result is now available.", timestamp: new Date(now - 3*D).toISOString(), read: false },
      { id: 8, type: "result", title: "Lab Exam Grades", message: "Check your lab exam grades.", timestamp: new Date(now - 5*D).toISOString(), read: true },
      { id: 9, type: "event", title: "Hackathon Registration Open", message: "Register for the 36-hour hackathon by Friday.", timestamp: new Date(now - 30*60000).toISOString(), read: false },
      { id: 10, type: "event", title: "Guest Lecture — AI in Healthcare", message: "Dr. Sharma speaks in Auditorium A at 3 PM.", timestamp: new Date(now - 3*H).toISOString(), read: false },
      { id: 11, type: "event", title: "Sports Day Registrations", message: "Register for cricket, badminton, or athletics.", timestamp: new Date(now - 4*D).toISOString(), read: false },
      { id: 12, type: "event", title: "NSS Camp Signup", message: "NSS camp next week. Sign up now.", timestamp: new Date(now - 5*D).toISOString(), read: false },
      { id: 13, type: "event", title: "Cultural Fest Auditions", message: "Dance and drama auditions this Saturday.", timestamp: new Date(now - 6*D).toISOString(), read: false },
      { id: 14, type: "event", title: "Old Workshop", message: "Python workshop resources uploaded.", timestamp: new Date(now - 8*D).toISOString(), read: false },
    ];

    function timeAgo(ts) {
      const d = Date.now() - new Date(ts).getTime();
      const m = Math.floor(d / 60000), h = Math.floor(d / 3600000), dy = Math.floor(d / 86400000);
      if (m < 60) return m + "m ago";
      if (h < 24) return h + "h ago";
      return dy + "d ago";
    }

    let filter = "all";

    function render() {
      const n = parseInt(document.getElementById("topN").value);
      const top = getTopN(notifications, n, filter);
      const unread = notifications.filter(x => !x.read).length;

      document.getElementById("subtitle").textContent =
        "Showing top " + top.length + " of " + unread + " unread notifications";

      const list = document.getElementById("list");
      if (top.length === 0) {
        list.innerHTML = '<div class="empty">No notifications found</div>';
        return;
      }

      list.innerHTML = top.map((x, i) => `
        <div class="card">
          <div class="card-header">
            <span class="card-rank">#${i + 1}</span>
            <span class="badge badge-${x.type}">${x.type}</span>
          </div>
          <div class="card-title">${x.title}</div>
          <div class="card-msg">${x.message}</div>
          <div class="card-footer">
            <span>⏱ ${timeAgo(x.timestamp)}</span>
            <span class="score">Score: ${x.score.toFixed(2)}</span>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("topN").addEventListener("change", render);

    document.querySelectorAll("button[data-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("button[data-filter]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
